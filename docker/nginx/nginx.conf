# Nginx configuration placeholder
# Bu dosya production deployment sırasında düzenlenecek

events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server api:5000;
    }

    server {
        listen 80;
        server_name tablewise.com.tr www.tablewise.com.tr;

        location / {
            # Landing page static files
            root /var/www/landing;
            try_files $uri $uri/ /index.html;
        }

        location /rezervasyon/ {
            # Booking UI static files
            root /var/www/booking-ui;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 80;
        server_name app.tablewise.com.tr;

        location / {
            # Admin panel static files
            root /var/www/admin-panel;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # SSL configuration will be added by Certbot
}
