version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tablewise_postgres_prod
    environment:
      POSTGRES_DB: tablewise
      POSTGRES_USER: tablewise_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tablewise_user -d tablewise"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tablewise_network

  redis:
    image: redis:7-alpine
    container_name: tablewise_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tablewise_network

  seq:
    image: datalust/seq:latest
    container_name: tablewise_seq_prod
    environment:
      ACCEPT_EULA: Y
    volumes:
      - ./data/seq:/data
    restart: always
    networks:
      - tablewise_network

  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: tablewise_api_prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Jwt__SecretKey: ${JWT_SECRET}
      Redis__ConnectionString: ${REDIS_CONNECTION_STRING}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tablewise_network

  nginx:
    image: nginx:alpine
    container_name: tablewise_nginx_prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: always
    networks:
      - tablewise_network

networks:
  tablewise_network:
    driver: bridge
