version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tablewise_postgres_prod
    environment:
      POSTGRES_DB: tablewise
      POSTGRES_USER: tablewise_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: always
    networks:
      - tablewise_network

  redis:
    image: redis:7-alpine
    container_name: tablewise_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    restart: always
    networks:
      - tablewise_network

  seq:
    image: datalust/seq:latest
    container_name: tablewise_seq_prod
    environment:
      ACCEPT_EULA: Y
    volumes:
      - ./data/seq:/data
    restart: always
    networks:
      - tablewise_network

  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: tablewise_api_prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - seq
    restart: always
    networks:
      - tablewise_network

  nginx:
    image: nginx:alpine
    container_name: tablewise_nginx_prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: always
    networks:
      - tablewise_network

networks:
  tablewise_network:
    driver: bridge
